name: Daily Job Hunt

on:
  schedule:
    # Runs at 9 AM EST (14:00 UTC) every day
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run daily job hunt
        run: |
          python main.py --daily
        env:
          PYTHONPATH: ${{ github.workspace }}/src
      
      - name: Configure Git
        run: |
          git config --local user.email "115662331+Jybhavsar12@users.noreply.github.com"
          git config --local user.name "Jyot Bhavsar"
      
      - name: Commit and push changes
        run: |
          git add data/
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date +%Y-%m-%d)
            JOBS_COUNT=$(cat data/jobs/jobs_${DATE}.json 2>/dev/null | python -c "import sys,json; print(json.load(sys.stdin).get('count', 0))" 2>/dev/null || echo "0")
            
            git commit -m "🎯 Daily job hunt: ${DATE} - Found ${JOBS_COUNT} jobs"
            git push
          fi
